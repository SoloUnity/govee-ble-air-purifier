name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.2"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install development dependencies
        run: python -m pip install --disable-pip-version-check -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Behavioral tests
        run: python -m pytest --ignore=tests/test_runtime_smoke.py

  home-assistant-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.2"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install Home Assistant and test dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          -e ".[dev]" "homeassistant==2026.7.2"
          "aiousbwatcher==1.1.2" "serialx==1.8.2"
          "aioesphomeapi==45.3.1"
      - name: Test against real Home Assistant APIs
        run: python -m pytest tests/test_runtime_smoke.py

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: "integration"

  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
